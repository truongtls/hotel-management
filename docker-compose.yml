services:
  db:
    image: postgres:16-alpine
    container_name: hotel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hotel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotel_pass}
      POSTGRES_DB: ${DB_NAME:-hotel_db}
    volumes:
      - hotel_db_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hotel_user} -d ${DB_NAME:-hotel_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hotel_net

  backend:
    build: ./backend
    container_name: hotel_backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-hotel_user}
      DB_PASSWORD: ${DB_PASSWORD:-hotel_pass}
      DB_NAME: ${DB_NAME:-hotel_db}
      JWT_SECRET: ${JWT_SECRET:-please_change_this_secret_key}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotel_net

  frontend:
    build: ./frontend
    container_name: hotel_frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - backend
    networks:
      - hotel_net

volumes:
  hotel_db_data:

networks:
  hotel_net:
    driver: bridge
